  <text x="540" y="1080" text-anchor="middle" font-family="Orbitron, 'Trebuchet MS', sans-serif" font-size="46" font-weight="500" letter-spacing="24" fill="#B16AFF" opacity="0.85">PRIVACY IS FREEDOM</text>
