<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920" role="img" aria-label="FIDUCARO mobile wallpaper">
  <defs>
    <linearGradient id="wm-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E0B16"/>
      <stop offset="0.5" stop-color="#1A1625"/>
      <stop offset="1" stop-color="#0E0B16"/>
    </linearGradient>
    <linearGradient id="wm-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B16AFF"/>
      <stop offset="1" stop-color="#7B3FF2"/>
    </linearGradient>
    <radialGradient id="wm-halo" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0" stop-color="#B16AFF" stop-opacity="0.5"/>
      <stop offset="0.6" stop-color="#7B3FF2" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#7B3FF2" stop-opacity="0"/>
