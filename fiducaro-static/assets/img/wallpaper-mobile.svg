    <linearGradient id="wm-refl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7B3FF2" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#7B3FF2" stop-opacity="0"/>
    </linearGradient>
    <filter id="wm-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="wm-kh">
