    <circle cx="120" cy="640" r="1.4" opacity="0.4"/><circle cx="980" cy="640" r="1.6" opacity="0.6"/>
  </g>

  <path d="M0 1120 L220 980 L440 1100 L640 960 L840 1100 L1080 980 L1080 1180 L0 1180 Z" fill="#1A1625"/>
  <path d="M0 1160 L300 1060 L560 1150 L820 1050 L1080 1160 L1080 1220 L0 1220 Z" fill="#0E0B16" opacity="0.85"/>

