<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="FIDUCARO desktop wallpaper">
  <defs>
    <linearGradient id="wd-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E0B16"/>
      <stop offset="0.55" stop-color="#1A1625"/>
      <stop offset="1" stop-color="#0E0B16"/>
    </linearGradient>
    <linearGradient id="wd-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B16AFF"/>
      <stop offset="1" stop-color="#7B3FF2"/>
    </linearGradient>
    <radialGradient id="wd-halo" cx="0.5" cy="0.42" r="0.42">
      <stop offset="0" stop-color="#B16AFF" stop-opacity="0.5"/>
      <stop offset="0.6" stop-color="#7B3FF2" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7B3FF2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wd-refl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7B3FF2" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7B3FF2" stop-opacity="0"/>
    </linearGradient>
    <filter id="wd-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="wd-kh">
      <rect width="1920" height="1080" fill="#fff"/>
      <circle cx="960" cy="470" r="34" fill="#000"/>
      <path d="M946 490 L974 490 L982 548 L938 548 Z" fill="#000"/>
    </mask>
  </defs>

  <rect width="1920" height="1080" fill="url(#wd-sky)"/>
  <ellipse cx="960" cy="450" rx="760" ry="560" fill="url(#wd-halo)"/>

  <!-- Starfield -->
  <g fill="#EDE8FF">
    <circle cx="240" cy="150" r="1.6" opacity="0.7"/><circle cx="520" cy="90" r="1.2" opacity="0.5"/>
    <circle cx="760" cy="200" r="1.8" opacity="0.8"/><circle cx="1180" cy="120" r="1.3" opacity="0.6"/>
    <circle cx="1440" cy="220" r="1.6" opacity="0.7"/><circle cx="1680" cy="130" r="1.2" opacity="0.5"/>
    <circle cx="360" cy="320" r="1.3" opacity="0.5"/><circle cx="1560" cy="360" r="1.5" opacity="0.7"/>
    <circle cx="120" cy="420" r="1.2" opacity="0.4"/><circle cx="1820" cy="300" r="1.4" opacity="0.6"/>
    <circle cx="880" cy="70" r="1.2" opacity="0.5"/><circle cx="1040" cy="260" r="1.4" opacity="0.6"/>
  </g>

  <!-- Mountains -->
  <path d="M0 720 L280 560 L520 700 L760 540 L960 700 L1180 560 L1440 720 L1700 580 L1920 700 L1920 760 L0 760 Z" fill="#1A1625"/>
  <path d="M0 740 L360 640 L640 730 L900 620 L1200 730 L1520 630 L1920 740 L1920 780 L0 780 Z" fill="#0E0B16" opacity="0.85"/>

  <!-- Reflective water -->
  <rect x="0" y="760" width="1920" height="320" fill="#0E0B16"/>
  <rect x="0" y="760" width="1920" height="320" fill="url(#wd-refl)"/>
  <g stroke="#B16AFF" stroke-opacity="0.18" stroke-width="2">
    <line x1="620" y1="820" x2="1300" y2="820"/><line x1="680" y1="880" x2="1240" y2="880"/>
    <line x1="740" y1="940" x2="1180" y2="940"/><line x1="800" y1="1000" x2="1120" y2="1000"/>
  </g>

  <!-- Emblem -->
  <g filter="url(#wd-glow)">
    <circle cx="960" cy="480" r="168" fill="none" stroke="url(#wd-g)" stroke-width="12"/>
    <g fill="url(#wd-g)">
      <rect x="928" y="222" width="64" height="52" rx="18"/>
      <rect x="944" y="274" width="32" height="96" rx="8"/>
      <path mask="url(#wd-kh)" d="M960 350 c52 0 80 36 80 90 c0 62 -36 126 -80 126 c-44 0 -80 -64 -80 -126 c0 -54 28 -90 80 -90 Z"/>
    </g>
    <g fill="#EDE8FF">
      <circle cx="892" cy="240" r="12"/><circle cx="892" cy="274" r="12"/>
      <circle cx="1028" cy="240" r="12"/><circle cx="1028" cy="274" r="12"/>
    </g>
  </g>

  <text x="960" y="900" text-anchor="middle" font-family="Orbitron, 'Trebuchet MS', sans-serif" font-size="40" font-weight="500" letter-spacing="26" fill="#B16AFF" opacity="0.85">PRIVACY IS FREEDOM</text>
</svg>
