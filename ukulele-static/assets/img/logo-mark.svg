<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 300" width="220" height="300" role="img" aria-label="Ukulele logo mark">
  <defs>
    <linearGradient id="uku-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B16AFF"/>
      <stop offset="1" stop-color="#7B3FF2"/>
    </linearGradient>
    <linearGradient id="uku-ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B16AFF"/>
      <stop offset="1" stop-color="#7B3FF2"/>
    </linearGradient>
    <!-- Keyhole punched out of the body so the mark works on any background -->
    <mask id="uku-keyhole">
      <rect x="0" y="0" width="220" height="300" fill="#fff"/>
      <circle cx="110" cy="188" r="15" fill="#000"/>
      <path d="M104 199 L116 199 L120 226 L100 226 Z" fill="#000"/>
    </mask>
  </defs>

  <!-- Protective ring (shield halo) around the body -->
  <circle cx="110" cy="196" r="82" fill="none" stroke="url(#uku-ring)" stroke-width="7"/>

  <g fill="url(#uku-grad)">
    <!-- Headstock -->
    <path d="M96 14 h28 a10 10 0 0 1 10 10 v20 a10 10 0 0 1 -10 10 h-28 a10 10 0 0 1 -10 -10 v-20 a10 10 0 0 1 10 -10 Z"/>
    <!-- Neck -->
    <rect x="102" y="60" width="16" height="70" rx="4"/>
    <!-- Body: rounded ukulele silhouette with keyhole cut out -->
    <path mask="url(#uku-keyhole)" d="M110 120
      c26 0 40 18 40 44
      c0 30 -18 62 -40 62
      c-22 0 -40 -32 -40 -62
      c0 -26 14 -44 40 -44 Z"/>
  </g>

  <!-- Tuning pegs -->
  <g fill="#EDE8FF">
    <circle cx="82" cy="26" r="6"/>
    <circle cx="82" cy="46" r="6"/>
    <circle cx="138" cy="26" r="6"/>
    <circle cx="138" cy="46" r="6"/>
  </g>
</svg>
